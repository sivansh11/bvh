settings:
  nee: true
  mis: true
  spp: 10
  background: [0.05, 0.05, 0.05]

camera:
  fov: 90
  from: [4, 1, 0]
  to: [-1, 1, 0]

entities:
  - name: "sponza"
    path: "../glTF-Sample-Models/2.0/Sponza/glTF/Sponza.gltf"
    transform:
      position: [0, 0, 0]
      rotation: [0, 0, 0]
      scale: [1, 1, 1]
    material:
      type: "lambertian"
      # albedo: [0.8, 0.8, 0.8]

  - name: "light"
    path: "./sphere.obj"
    transform:
      position: [0, 500, -75]
      rotation: [0, 0, 0]
      scale: [100, 100, 100]
    material:
      type: "light"
      emission: [100, 100, 100]

